@if (me(); as me) {
    <img
        [src]="me.avatarUrl"
        [alt]="me.username"
        class="header-avatar"
    >
    <div class="header-name__wrapper">
        <h4 class="h4">{{ me?.firstName }} {{ me.lastName }}</h4>
        <p
            class="header-username subtitle"
        >{{ me.username }}</p>
    </div>
    <a
        class="btn header-btn"
        [routerLink]="['/profile/edit']"
    >
        <p>Edit</p>
        <svg
            icon="settings"
            class="header-edit"
        ></svg>
    </a>
}
@else {
    <p>Error</p>
}
