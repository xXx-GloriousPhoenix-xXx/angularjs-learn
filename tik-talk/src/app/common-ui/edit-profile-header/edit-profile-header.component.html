@if (me(); as me) {
    <img
        [src]="me.avatarUrl"
        [alt]="me.username"
        class="header-avatar"
    >
    <div class="header-name__wrapper">
        <h4 class="h4">{{ me?.firstName }} {{ me.lastName }}</h4>
        <p
            class="header-username subtitle"
        >{{ me.username }}</p>
    </div>
}
