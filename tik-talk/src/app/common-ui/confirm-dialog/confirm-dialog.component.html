@if (dialog.state().isOpen) {
    <div class="confirm-dialog-backdrop" (click)="dialog.onCancel()">
        <div class="confirm-dialog" (click)="$event.stopPropagation()">
            <h4 class="confirm-dialog__title">{{ dialog.state().title }}</h4>
            <p class="confirm-dialog__message">{{ dialog.state().message }}</p>
            <div class="confirm-dialog__actions">
                <button
                    type="button"
                    class="btn inverse"
                    (click)="dialog.onCancel()"
                >{{ dialog.state().cancelText }}</button>
                <button
                    type="button"
                    class="btn"
                    (click)="dialog.onConfirm()"
                >{{ dialog.state().confirmText }}</button>
            </div>
        </div>
    </div>
}
