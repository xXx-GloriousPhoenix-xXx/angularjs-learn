<form
    class="profile-search-form"
    [formGroup]="searchForm"
>
    <app-form-field label="Name" formControlName="name" />
    <app-form-field label="Register Date" formControlName="registerDate" />
    <app-form-field label="City" formControlName="city" />
    <app-form-field label="Skills" formControlName="stack" />

    <button class="btn filter-btn">
        <svg icon="filter" class="filter-icon"></svg>
    </button>
</form>
