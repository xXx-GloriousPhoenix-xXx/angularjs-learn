<app-profile-filters (filtersChange)="onFiltersChange($event)" />

<div class="profile-list mt20 mb24">
    @for (profile of profiles().items; track profile.id) {
        <app-profile-card
            [profile]="profile"
            (skillClick)="onSkillClick($event)"
        ></app-profile-card>
    }
</div>

@if (profiles().pageCount > 1) {
    <div class="pagination">
        <button
            class="btn inverse"
            [disabled]="pageNum() <= 1"
            (click)="goToPage(pageNum() - 1)"
        >Prev</button>

        <span class="pagination__status medium-text">
            Page {{ pageNum() }} of {{ profiles().pageCount }}
        </span>

        <button
            class="btn inverse"
            [disabled]="pageNum() >= profiles().pageCount"
            (click)="goToPage(pageNum() + 1)"
        >Next</button>
    </div>
}
